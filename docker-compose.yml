services:
  backend:
    build: ./backend
    container_name: thinkboard-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build: ./frontend
    container_name: thinkboard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
